<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History - Digital Goods</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/services.css">
  <style>
    .orders-layout {
      padding: calc(var(--nav-height) + var(--spacing-xl)) 0 var(--spacing-xxl);
    }
    .order-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--color-border);
    }
    .order-item {
      display: flex;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      align-items: center;
    }
    .order-item img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }
    @media (max-width: 768px) {
      .order-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>

    <nav class="navbar glass">
    <div class="logo">
      <a href="index.html" class="nav-logo-link">
        <i class="fa-solid fa-server" style="color: var(--color-primary);"></i> IT Services
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Services</a>
      <a href="orders.html">Orders</a>
      <a href="about.html">About</a>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <a href="../digital/index.html" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
        <i class="fa-solid fa-right-left"></i> <span class="hide-on-mobile">Switch Services</span>
      </a>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <a href="cart.html" class="btn-icon" style="position: relative;">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge primary" id="nav-cart-count" style="position: absolute; top: -5px; right: -5px; padding: 2px 6px;">0</span>
      </a>
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </nav>

  <main class="container">
    <div class="orders-layout">
      <h1 style="margin-bottom: var(--spacing-xl);">Order History</h1>
      
      <!-- Order 1 -->
      <div class="order-card">
        <div class="order-header">
          <div>
            <span style="color: var(--color-text-muted); font-size: 0.9rem;">Order ID</span>
            <div style="font-weight: 600;">#ORD-9432-88</div>
          </div>
          <div>
            <span style="color: var(--color-text-muted); font-size: 0.9rem;">Date</span>
            <div style="font-weight: 600;">Oct 24, 2026</div>
          </div>
          <div>
            <span style="color: var(--color-text-muted); font-size: 0.9rem;">Total Amount</span>
            <div style="font-weight: 600;">$35.90</div>
          </div>
          <div>
            <span class="badge" style="background: rgba(16, 185, 129, 0.1); color: var(--color-success);">Completed</span>
          </div>
        </div>
        
        <div class="order-item">
          <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=100&auto=format&fit=crop" alt="Item">
          <div style="flex: 1;">
            <h4 style="margin-bottom: 0.25rem;">Netflix Premium - 1 Month</h4>
            <div style="color: var(--color-text-muted); font-size: 0.85rem;">Qty: 1</div>
          </div>
          <div>
            <button class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.85rem;"><i class="fa-solid fa-download"></i> View Key</button>
          </div>
        </div>

        <div style="text-align: right; margin-top: var(--spacing-md);">
          <button class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem;"><i class="fa-solid fa-file-invoice"></i> Download Invoice</button>
        </div>
      </div>

    </div>
  </main>

      <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="products.html" class="bottom-nav-item">
      <i class="fa-solid fa-briefcase"></i>
      <span>Services</span>
    </a>
    <a href="cart.html" class="bottom-nav-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/main.js"></script>
  <div class="cursor"></div>
</body>

</html>
