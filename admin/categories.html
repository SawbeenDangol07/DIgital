<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Categories</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../digital/css/variables.css">
  <link rel="stylesheet" href="../digital/css/global.css">
  <link rel="stylesheet" href="../digital/css/components.css">
  <link rel="stylesheet" href="../digital/css/animations.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-layer-group" style="margin-right: 10px;"></i> D-Goods Admin
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"><i class="fa-solid fa-box-open"></i> Orders</a>
      <a href="products.html"><i class="fa-solid fa-tags"></i> Products</a>
      <a href="categories.html" class="active"><i class="fa-solid fa-folder"></i> Categories</a>
      <a href="customers.html"><i class="fa-solid fa-users"></i> Customers</a>
      <a href="payments.html"><i class="fa-solid fa-credit-card"></i> Payments</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="../index.html" style="margin-top: 2rem; color: var(--color-danger);"><i class="fa-solid fa-right-from-bracket"></i> Storefront</a>
    </nav>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="admin-main">
    <header class="admin-header">
      <h2 style="font-size: 1.25rem;">Categories</h2>
      <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
    </header>

    <div class="admin-content animate-fade-in">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
        <div class="input-group" style="margin: 0; width: 300px;">
          <input type="text" class="input-field" placeholder="Search categories...">
        </div>
        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Category</button>
      </div>

      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Icon</th>
              <th>Name</th>
              <th>Products Count</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><i class="fa-solid fa-crown" style="font-size: 1.5rem; color: var(--color-primary);"></i></td>
              <td>Subscriptions</td>
              <td>120</td>
              <td>
                <button class="btn-icon" style="width: 30px; height: 30px;"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-icon" style="width: 30px; height: 30px; color: var(--color-danger);"><i class="fa-solid fa-trash"></i></button>
              </td>
            </tr>
            <tr>
              <td><i class="fa-solid fa-laptop-code" style="font-size: 1.5rem; color: var(--color-primary);"></i></td>
              <td>Software</td>
              <td>45</td>
              <td>
                <button class="btn-icon" style="width: 30px; height: 30px;"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-icon" style="width: 30px; height: 30px; color: var(--color-danger);"><i class="fa-solid fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script type="module" src="../digital/js/supabase-client.js"></script>
  <script src="../digital/js/main.js"></script>
</body>
</html>
