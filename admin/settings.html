<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../digital/css/variables.css">
  <link rel="stylesheet" href="../digital/css/global.css">
  <link rel="stylesheet" href="../digital/css/components.css">
  <link rel="stylesheet" href="../digital/css/animations.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-layer-group" style="margin-right: 10px;"></i> D-Goods Admin
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"><i class="fa-solid fa-box-open"></i> Orders</a>
      <a href="products.html"><i class="fa-solid fa-tags"></i> Products</a>
      <a href="categories.html"><i class="fa-solid fa-folder"></i> Categories</a>
      <a href="customers.html"><i class="fa-solid fa-users"></i> Customers</a>
      <a href="payments.html"><i class="fa-solid fa-credit-card"></i> Payments</a>
      <a href="settings.html" class="active"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="../index.html" style="margin-top: 2rem; color: var(--color-danger);"><i class="fa-solid fa-right-from-bracket"></i> Storefront</a>
    </nav>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="admin-main">
    <header class="admin-header">
      <h2 style="font-size: 1.25rem;">Settings</h2>
      <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
    </header>

    <div class="admin-content animate-fade-in">
      <div style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-xl); max-width: 800px;">
        <h3 style="margin-bottom: var(--spacing-lg);">General Settings</h3>
        <form>
          <div class="input-group">
            <label>Store Name</label>
            <input type="text" class="input-field" value="Digital Goods Marketplace">
          </div>
          <div class="input-group">
            <label>Support Email</label>
            <input type="email" class="input-field" value="support@d-goods.com">
          </div>
          
          <h3 style="margin-top: var(--spacing-xl); margin-bottom: var(--spacing-lg);">Payment Gateways</h3>
          
          <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-md);">
            <div style="flex:1; border: 1px solid var(--color-border); padding: var(--spacing-md); border-radius: var(--radius-sm); display:flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>Stripe</strong>
                <div style="font-size: 0.8rem; color: var(--color-text-secondary);">Enabled</div>
              </div>
              <input type="checkbox" checked>
            </div>
            <div style="flex:1; border: 1px solid var(--color-border); padding: var(--spacing-md); border-radius: var(--radius-sm); display:flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>PayPal</strong>
                <div style="font-size: 0.8rem; color: var(--color-text-secondary);">Enabled</div>
              </div>
              <input type="checkbox" checked>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="margin-top: var(--spacing-xl);" onclick="event.preventDefault(); alert('Settings Saved!')">Save Changes</button>
        </form>
      </div>
    </div>
  </main>
  <script type="module" src="../digital/js/supabase-client.js"></script>
  <script src="../digital/js/main.js"></script>
</body>
</html>
