<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Customers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-layer-group" style="margin-right: 10px;"></i> D-Goods Admin
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"><i class="fa-solid fa-box-open"></i> Orders</a>
      <a href="products.html"><i class="fa-solid fa-tags"></i> Products</a>
      <a href="categories.html"><i class="fa-solid fa-folder"></i> Categories</a>
      <a href="customers.html" class="active"><i class="fa-solid fa-users"></i> Customers</a>
      <a href="payments.html"><i class="fa-solid fa-credit-card"></i> Payments</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="../index.html" style="margin-top: 2rem; color: var(--color-danger);"><i class="fa-solid fa-right-from-bracket"></i> Storefront</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <header class="admin-header">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <h2 style="font-size: 1.25rem;">Customers</h2>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
      </div>
    </header>

    <div class="admin-content animate-fade-in">
      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Email</th>
              <th>Total Orders</th>
              <th>Total Spent</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <div style="display: flex; align-items: center; gap: 10px;">
                  <img src="https://i.pravatar.cc/150?img=11" style="width: 30px; height: 30px; border-radius: 50%;">
                  <span>John Doe</span>
                </div>
              </td>
              <td>john.doe@example.com</td>
              <td>12</td>
              <td>$450.00</td>
              <td><span class="badge" style="background: rgba(16, 185, 129, 0.1); color: var(--color-success);">Active</span></td>
              <td>
                <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">View</button>
                <button class="btn-icon" style="width: 25px; height: 25px; color: var(--color-danger); border: none;"><i class="fa-solid fa-ban"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="../js/main.js"></script>
</body>
</html>
