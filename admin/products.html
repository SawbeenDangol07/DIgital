<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../digital/css/variables.css">
  <link rel="stylesheet" href="../digital/css/global.css">
  <link rel="stylesheet" href="../digital/css/components.css">
  <link rel="stylesheet" href="../digital/css/animations.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-layer-group" style="margin-right: 10px;"></i> D-Goods Admin
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"><i class="fa-solid fa-box-open"></i> Orders</a>
      <a href="products.html" class="active"><i class="fa-solid fa-tags"></i> Products</a>
      <a href="categories.html"><i class="fa-solid fa-folder"></i> Categories</a>
      <a href="customers.html"><i class="fa-solid fa-users"></i> Customers</a>
      <a href="payments.html"><i class="fa-solid fa-credit-card"></i> Payments</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="../index.html" style="margin-top: 2rem; color: var(--color-danger);"><i class="fa-solid fa-right-from-bracket"></i> Storefront</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="admin-main">
    <header class="admin-header">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button class="btn-icon" id="mobile-menu-btn" style="display: none;"><i class="fa-solid fa-bars"></i></button>
        <h2 style="font-size: 1.25rem;">Products</h2>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
      </div>
    </header>

    <div class="admin-content animate-fade-in">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
        <div class="input-group" style="margin: 0; width: 300px;">
          <input type="text" class="input-field" placeholder="Search products...">
        </div>
        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Product</button>
      </div>

      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module" src="../digital/js/supabase-client.js"></script>
  <script src="../digital/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const tbody = document.querySelector('tbody');
      
      async function loadAdminProducts() {
        if (!window.fetchProducts) return;
        const products = await window.fetchProducts();
        
        tbody.innerHTML = '';
        products.forEach(prod => {
          const discountedPrice = window.calculateDiscount(prod.price, prod.discount);
          tbody.innerHTML += `
            <tr>
              <td>
                <div style="display: flex; align-items: center; gap: 10px;">
                  <img src="${prod.image}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                  <span>${prod.name}</span>
                </div>
              </td>
              <td>${prod.category}</td>
              <td>${window.formatCurrency(discountedPrice)}</td>
              <td>${prod.stock || 50}</td>
              <td><span class="badge" style="background: rgba(16, 185, 129, 0.1); color: var(--color-success);">Active</span></td>
              <td>
                <button class="btn-icon delete-btn" data-id="${prod.id}" style="width: 30px; height: 30px; color: var(--color-danger);"><i class="fa-solid fa-trash"></i></button>
              </td>
            </tr>
          `;
        });

        // Add Delete Listeners
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            if (id && confirm("Are you sure you want to delete this product?")) {
              window.db.products = window.db.products.filter(p => p.id != id);
              loadAdminProducts(); // Reload
            }
          });
        });
      }

      await loadAdminProducts();

      // Add Product Button
      const addBtn = document.querySelector('.btn-primary');
      if (addBtn) {
        addBtn.addEventListener('click', async () => {
          const name = prompt("Product Name:");
          if (!name) return;
          const category = prompt("Category (e.g. Subscriptions, Software):", "Subscriptions");
          const price = parseFloat(prompt("Price (e.g. 15.99):", "15.99"));
          const image = prompt("Image URL:", "https://images.unsplash.com/photo-1614680376593-902f74cf0d41?q=80&w=100&auto=format&fit=crop");
          
          window.db.products.unshift({
            id: Date.now(),
            name,
            category,
            price,
            image,
            rating: 5.0,
            reviews: 0
          });
          loadAdminProducts();
        });
      }
    });
  </script>
</body>
</html>
