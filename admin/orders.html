<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Orders</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../digital/css/variables.css">
  <link rel="stylesheet" href="../digital/css/global.css">
  <link rel="stylesheet" href="../digital/css/components.css">
  <link rel="stylesheet" href="../digital/css/animations.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-layer-group" style="margin-right: 10px;"></i> D-Goods Admin
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
      <a href="orders.html" class="active"><i class="fa-solid fa-box-open"></i> Orders</a>
      <a href="products.html"><i class="fa-solid fa-tags"></i> Products</a>
      <a href="categories.html"><i class="fa-solid fa-folder"></i> Categories</a>
      <a href="customers.html"><i class="fa-solid fa-users"></i> Customers</a>
      <a href="payments.html"><i class="fa-solid fa-credit-card"></i> Payments</a>
      <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="../index.html" style="margin-top: 2rem; color: var(--color-danger);"><i class="fa-solid fa-right-from-bracket"></i> Storefront</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="admin-main">
    <header class="admin-header">
      <div style="display: flex; align-items: center; gap: 1rem;">
        <h2 style="font-size: 1.25rem;">Orders</h2>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
      </div>
    </header>

    <div class="admin-content animate-fade-in">
      <div class="table-container">
        <div style="padding: var(--spacing-md); display:flex; gap: 1rem;">
          <input type="text" class="input-field" placeholder="Search orders..." style="width: 250px;">
          <select class="input-field" style="width: 150px;">
            <option>All Statuses</option>
            <option>Completed</option>
            <option>Pending</option>
            <option>Refunded</option>
          </select>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Total</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#ORD-9432</td>
              <td>john@example.com</td>
              <td>Oct 24, 2026</td>
              <td>$14.39</td>
              <td><span class="badge" style="background: rgba(16, 185, 129, 0.1); color: var(--color-success);">Completed</span></td>
              <td><button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">View</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script type="module" src="../digital/js/supabase-client.js"></script>
  <script src="../digital/js/main.js"></script>
</body>
</html>
