<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Digital Goods</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--spacing-xl);
      padding: calc(var(--nav-height) + var(--spacing-xl)) 0 var(--spacing-xxl);
    }
    
    .cart-items {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      padding: var(--spacing-lg);
    }

    .cart-item {
      display: flex;
      gap: var(--spacing-lg);
      padding: var(--spacing-md) 0;
      border-bottom: 1px solid var(--color-border);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }

    .item-details {
      flex: 1;
    }

    .item-details h3 {
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--color-bg);
      padding: 0.25rem;
      border-radius: var(--radius-sm);
      width: fit-content;
      margin-top: 0.5rem;
    }

    .qty-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer;
    }

    .order-summary {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      padding: var(--spacing-lg);
      height: fit-content;
      position: sticky;
      top: calc(var(--nav-height) + 20px);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--spacing-sm);
      color: var(--color-text-secondary);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--color-border);
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--color-text-primary);
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-item { flex-direction: column; }
      .cart-item img { width: 100%; height: 150px; }
      .order-summary { position: static; }
    }
  </style>
</head>
<body>

    <nav class="navbar glass">
    <div class="logo">
      <a href="index.html" class="nav-logo-link">
        <i class="fa-solid fa-layer-group" style="color: var(--color-primary);"></i> D-Goods
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="categories.html">Categories</a>
      <a href="products.html">Products</a>
      <a href="orders.html">Orders</a>
      <a href="about.html">About</a>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <a href="../services/index.html" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
        <i class="fa-solid fa-right-left"></i> <span class="hide-on-mobile">Switch Services</span>
      </a>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <a href="cart.html" class="btn-icon" style="position: relative;">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge primary" id="nav-cart-count" style="position: absolute; top: -5px; right: -5px; padding: 2px 6px;">0</span>
      </a>
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </nav>

  <main class="container">
    <div class="cart-layout">
      
      <!-- Cart Items -->
      <div class="cart-items">
        <h2 style="margin-bottom: var(--spacing-md);" id="cart-count-header">Your Cart (0 items)</h2>
        <div id="cart-items-container">
          <!-- Dynamic Items -->
        </div>
      </div>

      <!-- Summary -->
      <div class="order-summary" style="animation-delay: 0.2s;">
        <h3 style="margin-bottom: var(--spacing-md);">Order Summary</h3>
        
        <div class="input-group" style="display: flex; gap: 0.5rem;">
          <input type="text" class="input-field" placeholder="Promo code" style="margin-bottom: 0;">
          <button class="btn btn-outline" style="padding: 0.5rem 1rem;">Apply</button>
        </div>

        <div style="margin-top: var(--spacing-lg);">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Discount</span>
            <span style="color: var(--color-success);" id="summary-discount">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Tax (Estimated)</span>
            <span>$0.00</span>
          </div>
          <div class="summary-total">
            <span>Total</span>
            <span id="summary-total">$0.00</span>
          </div>
        </div>

        <button class="btn btn-primary" id="checkout-btn" style="width: 100%; margin-top: var(--spacing-xl);" onclick="proceedToCheckout()">
          Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
        </button>
        
        <div style="text-align: center; margin-top: var(--spacing-md); color: var(--color-text-muted); font-size: 0.85rem;">
          <i class="fa-solid fa-lock"></i> Secure encrypted checkout
        </div>
      </div>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script>window.portalType = "digital";</script>
  <script>window.portalType = "digital";</script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      const renderCart = () => {
        const cart = window.getCart();
        const container = document.getElementById('cart-items-container');
        const header = document.getElementById('cart-count-header');
        
        let rawSubtotal = 0;
        let subtotal = 0;
        let totalItems = 0;

        container.innerHTML = '';
        
        if (cart.length === 0) {
          container.innerHTML = '<p style="color: var(--color-text-secondary); padding: 2rem 0; text-align: center;">Your cart is empty.</p>';
          header.textContent = 'Your Cart (0 items)';
        } else {
          cart.forEach((cartItem, index) => {
            const product = window.db.products.find(p => p.id === cartItem.id);
            if (!product) return;
            
            rawSubtotal += product.price * cartItem.quantity;
            const discountedPrice = window.calculateDiscount(product.price, product.discount);
            const itemTotal = discountedPrice * cartItem.quantity;
            subtotal += itemTotal;
            totalItems += cartItem.quantity;
            
            container.innerHTML += `
              <div class="cart-item">
                <img src="${product.image}" alt="${product.name}">
                <div class="item-details">
                  <h3>${product.name}</h3>
                  <p style="color: var(--color-text-muted); font-size: 0.9rem;">Digital Good</p>
                  <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                    <span style="min-width: 20px; text-align: center;">${cartItem.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                  </div>
                </div>
                <div style="text-align: right;">
                  <div style="font-weight: bold; font-size: 1.1rem;">${window.formatCurrency(itemTotal)}</div>
                  <button class="btn-icon" onclick="removeItem(${index})" style="width:30px; height:30px; margin-top:10px; margin-left:auto; color:var(--color-danger); border:none; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
                </div>
              </div>
            `;
          });
          header.textContent = `Your Cart (${totalItems} items)`;
        }
        
        const totalDiscount = rawSubtotal - subtotal;
        
        document.getElementById('summary-subtotal').textContent = window.formatCurrency(rawSubtotal);
        
        const discountEl = document.getElementById('summary-discount');
        if (discountEl) discountEl.textContent = "-" + window.formatCurrency(totalDiscount);
        
        document.getElementById('summary-total').textContent = window.formatCurrency(subtotal);
      };

      window.updateQty = (index, change) => {
        const cart = window.getCart();
        if (cart[index]) {
          cart[index].quantity += change;
          if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
          }
          localStorage.setItem('cart_digital', JSON.stringify(cart));
          window.updateCartBadge();
          renderCart();
        }
      };

      window.removeItem = (index) => {
        const cart = window.getCart();
        cart.splice(index, 1);
        localStorage.setItem('cart_digital', JSON.stringify(cart));
        window.updateCartBadge();
        renderCart();
      };
      
      window.proceedToCheckout = () => {
        const cart = window.getCart();
        if (cart.length === 0) {
          window.showEmptyCartPopup();
          return;
        }
        if (!localStorage.getItem('mockUser')) {
          window.showLoginPopup();
          return;
        }
        window.location.href = 'checkout.html';
      };

      renderCart();
    });
  </script>
  <div class="cursor"></div>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="products.html" class="bottom-nav-item">
      <i class="fa-solid fa-box"></i>
      <span>Products</span>
    </a>
    <a href="categories.html" class="bottom-nav-item">
      <i class="fa-solid fa-layer-group"></i>
      <span>Categories</span>
    </a>
    <a href="cart.html" class="bottom-nav-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>
</body>

</html>
