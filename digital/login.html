<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Digital Goods</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  
</head>
<body>

  <div class="auth-container">
    <!-- Back to home -->
    <a href="index.html" class="btn-icon" style="position: absolute; top: 20px; left: 20px;">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="btn-icon" style="position: absolute; top: 20px; right: 20px;">
      <i class="fa-solid fa-moon"></i>
    </button>

    <div class="auth-card">
      <div class="auth-header">
        <i class="fa-solid fa-user-circle"></i>
        <h2>Welcome Back</h2>
        <p style="color: var(--color-text-secondary); margin-top: 0.5rem;">Sign in to access your digital goods.</p>
      </div>

      <div class="social-login">
        <button type="button" id="google-login-btn" class="social-btn" style="width: 100%;">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20" alt="Google"> Continue with Google
        </button>
      </div>

            <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/supabase-client.js"></script>
  <script src="js/main.js"></script>

      <script>
    document.addEventListener('DOMContentLoaded', () => {
      const googleBtn = document.getElementById('google-login-btn');
      if (googleBtn) {
        googleBtn.addEventListener('click', async () => {
          googleBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Connecting...';
          googleBtn.disabled = true;

          try {
            const { data, error } = await window.supabase.auth.signInWithOAuth({
              provider: 'google',
              options: {
                redirectTo: window.location.href.replace('login.html', 'index.html').replace('signup.html', 'index.html')
              }
            });
            if (error) throw error;
          } catch (error) {
            console.error("Auth error:", error);
            alert("Authentication failed.");
            googleBtn.innerHTML = '<img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20" alt="Google"> Continue with Google';
            googleBtn.disabled = false;
          }
        });
      }
    });
  </script>
  <div class="cursor"></div>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="products.html" class="bottom-nav-item">
      <i class="fa-solid fa-box"></i>
      <span>Products</span>
    </a>
    <a href="categories.html" class="bottom-nav-item">
      <i class="fa-solid fa-layer-group"></i>
      <span>Categories</span>
    </a>
    <a href="cart.html" class="bottom-nav-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>
</body>

</html>
