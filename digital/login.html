<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Digital Goods</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-xl) var(--spacing-md);
      position: relative;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      padding: var(--spacing-xxl);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-lg);
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .auth-header i {
      font-size: 2.5rem;
      color: var(--color-primary);
      margin-bottom: var(--spacing-sm);
    }

    .social-login {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-weight: 500;
    }

    .social-btn:hover {
      background: var(--color-surface-hover);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin-bottom: var(--spacing-lg);
      color: var(--color-text-muted);
      font-size: 0.9rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--color-border);
    }

    .divider:not(:empty)::before {
      margin-right: .5em;
    }

    .divider:not(:empty)::after {
      margin-left: .5em;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--color-text-muted);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--spacing-xl);
      font-size: 0.95rem;
      color: var(--color-text-secondary);
    }

    .auth-footer a {
      color: var(--color-primary);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <!-- Back to home -->
    <a href="index.html" class="btn-icon" style="position: absolute; top: 20px; left: 20px;">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="btn-icon" style="position: absolute; top: 20px; right: 20px;">
      <i class="fa-solid fa-moon"></i>
    </button>

    <div class="auth-card">
      <div class="auth-header">
        <i class="fa-solid fa-user-circle"></i>
        <h2>Welcome Back</h2>
        <p style="color: var(--color-text-secondary); margin-top: 0.5rem;">Sign in to access your digital goods.</p>
      </div>

      <div class="social-login">
        <button type="button" class="social-btn" style="width: 100%;">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20" alt="Google"> Continue with Google
        </button>
      </div>

      <div class="divider">or sign in with email</div>

      <form id="login-form">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="input-field" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xs);">
            <label style="margin: 0;">Password</label>
            <a href="#" style="font-size: 0.8rem; color: var(--color-primary);">Forgot Password?</a>
          </div>
          <div class="password-wrapper">
            <input type="password" class="input-field" id="password-input" placeholder="••••••••" required>
            <i class="fa-solid fa-eye password-toggle" id="toggle-password"></i>
          </div>
        </div>

        <div style="margin-bottom: var(--spacing-lg);">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--color-text-secondary); font-size: 0.9rem;">
            <input type="checkbox"> Remember me for 30 days
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Password toggle
      const togglePassword = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password-input');

      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          togglePassword.classList.toggle('fa-eye');
          togglePassword.classList.toggle('fa-eye-slash');
        });
      }

      // Mock Login
      const loginForm = document.getElementById('login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const submitBtn = loginForm.querySelector('button[type="submit"]');
          const originalText = submitBtn.textContent;
          submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';
          submitBtn.disabled = true;

          setTimeout(() => {
            localStorage.setItem('mockUser', 'true');
            window.location.href = 'index.html';
            });
      }
    });
  </script>
  <div class="cursor"></div>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="products.html" class="bottom-nav-item">
      <i class="fa-solid fa-box"></i>
      <span>Products</span>
    </a>
    <a href="categories.html" class="bottom-nav-item">
      <i class="fa-solid fa-layer-group"></i>
      <span>Categories</span>
    </a>
    <a href="cart.html" class="bottom-nav-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>
</body>

</html>
