<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Digital Goods</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="js/data.js"></script>
  <script>window.portalType = "digital";</script>
  <script>window.portalType = "digital";</script>
  
  <style>
    .product-details-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-xxl);
      padding: calc(var(--nav-height) + var(--spacing-xl)) 0 var(--spacing-xxl);
    }

    .product-gallery {
      position: sticky;
      top: calc(var(--nav-height) + 20px);
      height: fit-content;
    }

    .main-image {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--spacing-md);
    }

    .thumbnail-list {
      display: flex;
      gap: var(--spacing-sm);
    }

    .thumbnail {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .thumbnail.active, .thumbnail:hover {
      border-color: var(--color-primary);
    }

    .product-info h1 {
      font-size: 2.5rem;
      margin-bottom: var(--spacing-sm);
    }

    .rating-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: var(--spacing-lg);
    }

    .price-wrap {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: var(--spacing-xl);
      padding-bottom: var(--spacing-lg);
      border-bottom: 1px solid var(--color-border);
    }

    .price-wrap .current-price {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    .price-wrap .old-price {
      font-size: 1.25rem;
      color: var(--color-text-muted);
      text-decoration: line-through;
    }

    .price-wrap .discount-badge {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-pill);
      font-weight: 600;
    }

    .features-list {
      margin-bottom: var(--spacing-xl);
    }

    .features-list li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      color: var(--color-text-secondary);
    }

    .features-list i {
      color: var(--color-success);
    }

    .actions {
      display: flex;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }

    .actions .btn {
      flex: 1;
      padding: 1rem;
      font-size: 1.1rem;
    }

    .seller-info {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .seller-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--color-surface-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--color-text-muted);
    }

    @media (max-width: 992px) {
      .product-details-container {
        grid-template-columns: 1fr;
      }
      .product-gallery {
        position: static;
      }
    }
  </style>
</head>
<body>

    <nav class="navbar glass">
    <div class="logo">
      <a href="index.html" class="nav-logo-link">
        <i class="fa-solid fa-layer-group" style="color: var(--color-primary);"></i> D-Goods
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="categories.html">Categories</a>
      <a href="products.html">Products</a>
      <a href="orders.html">Orders</a>
      <a href="about.html">About</a>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <a href="../services/index.html" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
        <i class="fa-solid fa-right-left"></i> <span class="hide-on-mobile">Switch Services</span>
      </a>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <a href="cart.html" class="btn-icon" style="position: relative;">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge primary" id="nav-cart-count" style="position: absolute; top: -5px; right: -5px; padding: 2px 6px;">0</span>
      </a>
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </nav>

  <main class="container">
    <div class="product-details-container" id="product-detail">
      <!-- Populated by JS -->
      <div class="product-gallery">
        <div class="skeleton skeleton-image" style="height: 400px; margin-bottom: 1rem;"></div>
        <div style="display:flex; gap:10px;">
          <div class="skeleton" style="width: 80px; height: 60px;"></div>
          <div class="skeleton" style="width: 80px; height: 60px;"></div>
          <div class="skeleton" style="width: 80px; height: 60px;"></div>
        </div>
      </div>
      <div class="product-info">
        <div class="skeleton skeleton-text" style="height: 3rem; margin-bottom: 1rem;"></div>
        <div class="skeleton skeleton-text short" style="height: 1.5rem;"></div>
      </div>
    </div>
  </main>

    <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="products.html" class="bottom-nav-item">
      <i class="fa-solid fa-box"></i>
      <span>Products</span>
    </a>
    <a href="categories.html" class="bottom-nav-item">
      <i class="fa-solid fa-layer-group"></i>
      <span>Categories</span>
    </a>
    <a href="cart.html" class="bottom-nav-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script>window.portalType = "digital";</script>
  <script>window.portalType = "digital";</script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        let prod = window.db.products.find(p => p.id === id);
        if(!prod) prod = window.db.products[0];

        if (window.portalType === 'service') {
          document.title = prod.name + " - IT Services";
          
          
        } else {
          document.title = prod.name + " - Digital Goods";
        }
        
        
        
        const discountedPrice = window.calculateDiscount(prod.price, prod.discount);
        
        const container = document.getElementById('product-detail');
        
        container.innerHTML = `
          <div class="product-gallery">
            <img src="${prod.image}" alt="${prod.name}" class="main-image">
            <div class="thumbnail-list">
              <img src="${prod.image}" class="thumbnail active">
            </div>
          </div>
          
          <div class="product-info">
            <span class="badge primary" style="margin-bottom: 1rem;">${prod.type === 'service' ? 'Professional Service' : 'Digital Delivery'}</span>
            <h1>${prod.name}</h1>
            
            <div class="rating-wrap">
              <div style="color: var(--color-warning);">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star-half-stroke"></i>
              </div>
              <span style="color: var(--color-text-secondary);">${prod.rating} (${prod.reviews} Reviews)</span>
              <span style="color: var(--color-text-muted);">|</span>
              <span style="color: var(--color-success);"><i class="fa-solid fa-check-circle"></i> ${prod.type === 'service' ? 'Available to Start' : 'In Stock'}</span>
            </div>
            
            <p style="font-size: 1.1rem; color: var(--color-text-secondary); margin-bottom: 1.5rem; line-height: 1.6;">
              ${prod.description}
            </p>
            
            <div class="price-wrap">
              <span class="current-price">${window.formatCurrency(discountedPrice)}</span>
              ${prod.discount > 0 ? `<span class="old-price">${window.formatCurrency(prod.price)}</span>` : ''}
              ${prod.discount > 0 ? `<span class="discount-badge">Save ${prod.discount}%</span>` : ''}
            </div>
            
            <h3 style="margin-bottom: 1rem;">Key Features</h3>
            <ul class="features-list">
              ${prod.features.map(f => `<li><i class="fa-solid fa-check"></i> ${f}</li>`).join('')}
            </ul>
            
            <div class="actions">
              <button class="btn btn-primary" onclick="window.location.href='checkout.html'">
                <i class="fa-solid fa-bolt"></i> Buy Now
              </button>
              <button class="btn btn-outline" onclick="window.addToCart('${prod.id}')">
                <i class="fa-solid fa-cart-plus"></i> Add to Cart
              </button>
            </div>
          </div>
        `;
    });
  </script>
  <div class="cursor"></div>
</body>

</html>
