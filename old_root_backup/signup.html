<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Digital Goods</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* Same styles as login but adjusted */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-xl) var(--spacing-md);
      position: relative;
    }
    .auth-card {
      width: 100%;
      max-width: 500px;
      padding: var(--spacing-xxl);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-lg);
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }
    .password-wrapper { position: relative; }
    .password-toggle {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--color-text-muted);
    }
    .auth-footer { text-align: center; margin-top: var(--spacing-xl); font-size: 0.95rem; color: var(--color-text-secondary); }
    .auth-footer a { color: var(--color-primary); font-weight: 600; }
    .form-row { display: flex; gap: var(--spacing-md); }
    .form-row .input-group { flex: 1; }
  </style>
</head>
<body>

  <div class="auth-container">
    <a href="index.html" class="btn-icon" style="position: absolute; top: 20px; left: 20px;">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    
    <div class="auth-card animate-zoom-in">
      <div class="auth-header">
        <h2>Create an Account</h2>
        <p style="color: var(--color-text-secondary); margin-top: 0.5rem;">Join the best digital goods marketplace.</p>
      </div>

      <div class="social-login">
        <button type="button" class="social-btn" style="width: 100%;">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20" alt="Google"> Continue with Google
        </button>
      </div>

      <div class="divider">or sign up with email</div>

      <form id="signup-form">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" class="input-field" placeholder="John Doe" required>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="input-field" placeholder="you@example.com" required>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" class="input-field" placeholder="••••••••" required>
            </div>
          </div>
          <div class="input-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
              <input type="password" class="input-field" placeholder="••••••••" required>
            </div>
          </div>
        </div>

        <div style="margin-bottom: var(--spacing-lg);">
          <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer; color: var(--color-text-secondary); font-size: 0.85rem; line-height: 1.4;">
            <input type="checkbox" required style="margin-top: 3px;"> 
            <span>I agree to the <a href="terms.html" style="color: var(--color-primary);">Terms of Service</a> and <a href="privacy.html" style="color: var(--color-primary);">Privacy Policy</a>.</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const signupForm = document.getElementById('signup-form');
      if (signupForm) {
        signupForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const submitBtn = signupForm.querySelector('button[type="submit"]');
          const originalText = submitBtn.textContent;
          submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
          submitBtn.disabled = true;

          setTimeout(() => {
            alert("Account created successfully! You can now log in.");
            window.location.href = 'login.html';
          }, 1500);
        });
      }
    });
  </script>
</body>
</html>
