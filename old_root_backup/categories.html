<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - Digital Goods</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    window.portalType = urlParams.get('type') || 'digital';
    if (window.portalType === 'service') {
      document.write('<link rel="stylesheet" href="css/services.css">');
    }
  </script>
  <style>
    .page-header {
      padding: calc(var(--nav-height) + var(--spacing-xl)) 0 var(--spacing-xl);
      text-align: center;
      background: linear-gradient(180deg, var(--color-surface-hover) 0%, transparent 100%);
      margin-bottom: var(--spacing-xl);
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--spacing-xl);
      margin-bottom: var(--spacing-xxl);
    }

    .cat-card {
      text-align: center;
      padding: var(--spacing-xl) var(--spacing-lg);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      transition: all var(--transition-normal);
      cursor: pointer;
    }

    .cat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
      border-color: var(--color-primary);
    }

    .cat-card i {
      font-size: 3rem;
      color: var(--color-primary);
      margin-bottom: var(--spacing-md);
    }
  </style>
</head>
<body>

  <!-- Navbar (Same as index.html conceptually, but for simplicity we keep it inline here for vanilla HTML) -->
  <nav class="navbar glass">
    <div class="logo" id="dynamic-logo">
      <a href="index.html" style="font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem;">
        <i class="fa-solid fa-layer-group" style="color: var(--color-primary);"></i> D-Goods
      </a>
    </div>
    <div class="nav-links" id="dynamic-nav">
      <a href="digital.html">Home</a>
      <a href="categories.html?type=digital">Categories</a>
      <a href="products.html?type=digital">Products</a>
      <a href="orders.html">Orders</a>
      <a href="about.html">About</a>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;" id="nav-actions">
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <a href="cart.html" class="btn-icon" style="position: relative;">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="badge primary" style="position: absolute; top: -5px; right: -5px; padding: 2px 6px;">0</span>
      </a>
      <a href="login.html" class="btn btn-primary">Login</a>
    </div>
  </nav>

  <main>
    <div class="page-header animate-slide-up">
      <div class="container">
        <h1>All Categories</h1>
        <p style="color: var(--color-text-secondary); max-width: 600px; margin: 1rem auto 0;">Browse our vast collection of digital products organized by category.</p>
      </div>
    </div>

    <div class="container">
      <div class="cat-grid animate-fade-in stagger-2" id="all-categories">
        <!-- JS will populate -->
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a href="categories.html" class="bottom-nav-item">
      <i class="fa-solid fa-layer-group"></i>
      <span>Categories</span>
    </a>
    <a href="cart.html" class="bottom-nav-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>Cart</span>
    </a>
    <a href="profile.html" class="bottom-nav-item">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      if (window.portalType === 'service') {
        document.title = "Categories - IT Services";
        document.querySelector('.page-header h1').innerText = "Service Categories";
        document.querySelector('.page-header p').innerText = "Browse our comprehensive list of expert IT services.";
        
        document.getElementById('dynamic-logo').innerHTML = `
          <a href="index.html" style="font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem;">
            <i class="fa-solid fa-server" style="color: var(--color-primary);"></i> IT Services
          </a>
        `;
        document.getElementById('dynamic-nav').innerHTML = `
          <a href="services.html">Home</a>
          <a href="products.html?type=service">Services</a>
          <a href="orders.html">Orders</a>
          <a href="about.html">About</a>
        `;
        
        // Add Switch Button
        const themeToggle = document.getElementById('theme-toggle');
        const switchBtn = document.createElement('a');
        switchBtn.href = "digital.html";
        switchBtn.className = "btn btn-outline";
        switchBtn.style.cssText = "padding: 0.5rem 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;";
        switchBtn.innerHTML = '<i class="fa-solid fa-right-left"></i> <span class="hide-on-mobile">Switch Services</span>';
        themeToggle.parentNode.insertBefore(switchBtn, themeToggle);
      } else {
        // Add Switch Button for Digital Goods
        const themeToggle = document.getElementById('theme-toggle');
        const switchBtn = document.createElement('a');
        switchBtn.href = "services.html";
        switchBtn.className = "btn btn-outline";
        switchBtn.style.cssText = "padding: 0.5rem 1rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;";
        switchBtn.innerHTML = '<i class="fa-solid fa-right-left"></i> <span class="hide-on-mobile">Switch Services</span>';
        themeToggle.parentNode.insertBefore(switchBtn, themeToggle);
      }

      const grid = document.getElementById('all-categories');
      window.db.categories.filter(c => c.type === window.portalType).forEach(cat => {
        grid.innerHTML += `
          <div class="cat-card" onclick="window.location.href='products.html?type=${window.portalType}'">
            <i class="${cat.icon}"></i>
            <h3>${cat.name}</h3>
            <p style="color: var(--color-text-muted); margin-top: 0.5rem;">${cat.count} Items</p>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
